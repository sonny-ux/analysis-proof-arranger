<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern Analysis — Proof Arrangement Worksheet</title>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,700;1,400&family=JetBrains+Mono:wght@300;400;500&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"
  onload="document.addEventListener('DOMContentLoaded',()=>{init();})"></script>
<style>
:root{
  --bg:#fafaf8;--card:#fff;--border:#e2ddd6;--border2:#ccc8c0;
  --text:#1c1917;--muted:#78716c;--subtle:#a8a29e;
  --acc:#1d4ed8;--accbg:#eff6ff;--accbd:#bfdbfe;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'EB Garamond',serif;font-size:17px;line-height:1.7;overflow-x:hidden;}

/* NAV */
.topnav{position:fixed;top:0;left:0;right:0;z-index:200;background:rgba(250,250,248,.97);backdrop-filter:blur(8px);border-bottom:1px solid var(--border);}
.navs{display:flex;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;}
.navs::-webkit-scrollbar{display:none;}
.nt{flex-shrink:0;padding:11px 15px;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);border:none;border-bottom:2px solid transparent;background:none;cursor:pointer;transition:all .15s;white-space:nowrap;}
.nt:hover{color:var(--text);}
.nt.active{color:var(--acc);border-bottom-color:var(--acc);}
.pbar{height:2px;background:var(--border);}
.pfill{height:100%;background:var(--acc);width:0%;transition:width .15s;}

/* SCORE BAR */
.scorebar{position:fixed;bottom:0;left:0;right:0;z-index:190;background:rgba(250,250,248,.97);border-top:1px solid var(--border);padding:8px 20px;display:flex;align-items:center;gap:16px;}
.score-txt{font-family:'JetBrains Mono',monospace;font-size:.78rem;color:var(--muted);}
.score-val{font-family:'JetBrains Mono',monospace;font-size:.9rem;font-weight:500;color:var(--acc);}

/* PAGES */
.page{display:none;padding:54px 0 60px;}
.page.active{display:block;}

/* SECTION HEADER */
.ps-header{padding:24px 20px 14px;border-bottom:1px solid var(--border);}
.ps-badge{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.22em;text-transform:uppercase;padding:3px 9px;border-radius:2px;background:var(--accbg);color:var(--acc);margin-bottom:10px;}
.ps-header h1{font-family:'Cinzel',serif;font-size:1.5rem;font-weight:600;line-height:1.3;margin-bottom:6px;}
.ps-desc{font-size:.88rem;color:var(--muted);font-style:italic;}

/* PROBLEM CARD */
.prob{border:1px solid var(--border);border-radius:4px;margin:14px 20px;overflow:hidden;background:var(--card);}
.prob-header{padding:12px 16px;background:#f8f8f8;border-bottom:1px solid var(--border);}
.prob-num{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.18em;color:var(--subtle);margin-bottom:4px;}
.prob-title{font-family:'Cinzel',serif;font-size:.95rem;font-weight:600;margin-bottom:3px;}
.prob-src{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--subtle);}
.prob-stmt{padding:12px 16px;font-size:.9rem;line-height:1.7;border-bottom:1px solid var(--border);background:#fefefe;}
.prob-stmt strong{color:var(--acc);}

/* INSTRUCTIONS LINE */
.arrange-label{padding:8px 16px;font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:.15em;color:var(--subtle);text-transform:uppercase;border-bottom:1px solid var(--border);}

/* STEP CARDS */
.steps-grid{padding:12px 16px;display:flex;flex-direction:column;gap:8px;}
.step{border:1px solid var(--border);border-radius:3px;padding:11px 14px;cursor:pointer;transition:all .15s;display:flex;align-items:flex-start;gap:10px;background:var(--card);user-select:none;-webkit-tap-highlight-color:transparent;}
.step:hover{border-color:var(--acc);background:var(--accbg);}
.step.selected{border-color:var(--acc);background:var(--accbg);}
.step.correct{border-color:#16a34a;background:#f0fdf4;}
.step.wrong{border-color:#e11d48;background:#fff1f2;}
.step.revealed-ok{border-color:#16a34a;background:#f0fdf4;opacity:.85;}
.step.revealed-no{border-color:var(--border);background:var(--bg);opacity:.7;}
.step-badge{font-family:'JetBrains Mono',monospace;font-size:.75rem;min-width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;border:1px solid var(--border);background:var(--bg);color:var(--subtle);}
.step.selected .step-badge{background:var(--acc);color:#fff;border-color:var(--acc);}
.step.correct .step-badge{background:#16a34a;color:#fff;border-color:#16a34a;}
.step.wrong .step-badge{background:#e11d48;color:#fff;border-color:#e11d48;}
.step-text{font-size:.9rem;line-height:1.65;flex:1;}

/* BUTTONS */
.btn-row{padding:10px 16px 14px;display:flex;gap:8px;flex-wrap:wrap;border-top:1px solid var(--border);}
.btn{padding:7px 14px;border-radius:3px;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;border:1px solid;transition:all .12s;-webkit-tap-highlight-color:transparent;}
.btn-check{background:var(--acc);color:#fff;border-color:var(--acc);}
.btn-check:hover{opacity:.85;}
.btn-reset{background:var(--bg);color:var(--muted);border-color:var(--border);}
.btn-reset:hover{border-color:var(--border2);color:var(--text);}
.btn-reveal{background:#fffbeb;color:#b45309;border-color:#fde68a;}
.btn-reveal:hover{background:#fef3c7;}
.btn-check:disabled{opacity:.45;cursor:default;}

/* FEEDBACK */
.feedback{display:none;padding:10px 16px;font-size:.88rem;line-height:1.65;}
.feedback.show{display:block;}
.fb-ok{background:#f0fdf4;border-top:1px solid #bbf7d0;color:#166534;}
.fb-no{background:#fff1f2;border-top:1px solid #fecdd3;color:#9b1c1c;}
.reveal-note{background:#fffbeb;border-top:1px solid #fde68a;padding:10px 16px;font-size:.83rem;color:var(--muted);display:none;}
.reveal-note.show{display:block;}
.reveal-note strong{color:var(--text);}

/* PROGRESS within page */
.page-progress{padding:6px 20px 0;font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--subtle);text-align:right;}

/* TABLET */
@media(min-width:601px) and (max-width:1100px){
  body{font-size:18px;}
  .prob{margin:14px 32px;}
  .step{padding:13px 16px;min-height:52px;}
  .prob-stmt{padding:14px 20px;}
  .steps-grid{padding:14px 20px;}
  .btn-row{padding:12px 20px 16px;}
  .ps-header{padding:28px 32px 16px;}
  .page-progress{padding:8px 32px 0;}
  .arrange-label,.feedback,.reveal-note{padding-left:20px;padding-right:20px;}
}
@media(max-width:600px){body{font-size:16px;}.prob{margin:10px 12px;}.ps-header{padding:18px 14px 10px;}.ps-header h1{font-size:1.3rem;}}
.katex{font-size:.97em;}
.katex-display{overflow-x:auto;margin:.3em 0;}
</style>
</head>
<body>

<nav class="topnav">
  <div class="navs" id="navs"></div>
  <div class="pbar"><div class="pfill" id="pfill"></div></div>
</nav>

<div id="pages"></div>

<div class="scorebar">
  <span class="score-txt">Score</span>
  <span class="score-val" id="score-val">0 / 32</span>
  <span class="score-txt" id="score-pct" style="margin-left:4px"></span>
</div>

<script>
// ─── DATA ────────────────────────────────────────────────────────────────────
// Each problem: { ps, pnum, title, src, stmt, steps: [{t, r}] }
// t = step text (may contain $ math $)
// r = correct rank (0 = first step, 1 = second, etc.)
// Steps listed in DISPLAY order (shuffled); r tells the correct position.

const PS = [
  { label:"PS 1", topic:"Real Numbers & Set Theory", probs:[

    { pnum:1, title:"Additive Inverse is Unique", src:"PS1 Exercise 6.2",
      stmt:"Using the field axioms, prove that the additive inverse of any $x \\in \\mathbb{R}$ is unique.",
      steps:[
        {t:"By associativity (A3): $y+(x+z)=(y+x)+z$.", r:2},
        {t:"Suppose $y$ and $z$ are both additive inverses of $x$, so $x+y=0$ and $x+z=0$.", r:0},
        {t:"So $(y+x)+z = 0+z = z$ by axiom (A4).", r:4},
        {t:"Then $y = y+0 = y+(x+z)$, using $x+z=0$.", r:1},
        {t:"Since $x+y=0$, commutativity (A2) gives $y+x=0$.", r:3},
        {t:"Combining: $y=z$.", r:5},
      ]},

    { pnum:2, title:"$-(-x)=x$", src:"PS1 Exercise 6.5",
      stmt:"Using the field axioms (and the uniqueness of additive inverses), prove that $-(-x)=x$ for all $x\\in\\mathbb{R}$.",
      steps:[
        {t:"$-(-x)$ is defined as the unique additive inverse of $-x$.", r:3},
        {t:"By definition of additive inverse: $x+(-x)=0$.", r:0},
        {t:"Therefore $-(-x)=x$.", r:4},
        {t:"This equation also says that $x$ is an additive inverse of $-x$.", r:1},
        {t:"Since additive inverses are unique (proved in Ex 6.2), the additive inverse of $-x$ is exactly $x$.", r:2},
      ]},

    { pnum:3, title:"Infimum Exists for Sets Bounded Below", src:"PS1 Exercise 7",
      stmt:"Let $X \\subseteq \\mathbb{R}$ be nonempty and bounded below. Prove that $\\inf X$ exists in $\\mathbb{R}$.",
      steps:[
        {t:"Since $X$ is bounded below by $m$: $m \\leq x$ for all $x$, so $-m \\geq -x$ for all $-x\\in -X$. Thus $-X$ is bounded above.", r:1},
        {t:"We claim $\\inf X = -\\alpha$. For any $x\\in X$: $-x \\leq \\alpha$, so $x \\geq -\\alpha$. Hence $-\\alpha$ is a lower bound of $X$.", r:3},
        {t:"Let $-X = \\{-x : x\\in X\\}$. Since $X\\neq\\emptyset$, we have $-X\\neq\\emptyset$.", r:0},
        {t:"If $\\beta > -\\alpha$, then $-\\beta < \\alpha = \\sup(-X)$, so $\\exists {-x}\\in -X$ with $-x > -\\beta$, i.e., $x < \\beta$.", r:4},
        {t:"By the LUB property, $\\alpha = \\sup(-X)$ exists in $\\mathbb{R}$.", r:2},
        {t:"So $\\beta$ is not a lower bound of $X$. This confirms $-\\alpha = \\inf X$.", r:5},
      ]},

    { pnum:4, title:"De Morgan's Law: $(A\\cup B)^c = A^c\\cap B^c$", src:"PS1 Exercise 4.1",
      stmt:"Let $A, B \\subseteq X$. Prove that $(A\\cup B)^c = A^c \\cap B^c$.",
      steps:[
        {t:"Conversely, let $x\\in A^c\\cap B^c$. Then $x\\notin A$ and $x\\notin B$.", r:3},
        {t:"So $x\\notin A\\cup B$, meaning $x\\in(A\\cup B)^c$.", r:4},
        {t:"Let $x\\in(A\\cup B)^c$. Then $x\\notin A\\cup B$.", r:0},
        {t:"Since both inclusions hold, $(A\\cup B)^c = A^c\\cap B^c$.", r:5},
        {t:"This means $x\\notin A$ and $x\\notin B$, so $x\\in A^c$ and $x\\in B^c$, hence $x\\in A^c\\cap B^c$.", r:1},
        {t:"We have shown $(A\\cup B)^c \\subseteq A^c\\cap B^c$ (steps 1–3) and $A^c\\cap B^c\\subseteq(A\\cup B)^c$ (steps 4–5).", r:2},
      ]},
  ]},

  { label:"PS 3", topic:"Basic Topology", probs:[

    { pnum:1, title:"$\\sup A \\in A$ when $A$ is Closed and Bounded", src:"PS3 Exercise 4",
      stmt:"Let $A\\subseteq\\mathbb{R}$ be nonempty, bounded, and closed. Prove that $\\sup A \\in A$.",
      steps:[
        {t:"Since $A$ is closed: $A = \\bar{A}$ (Thm 2.27b). Therefore $\\sup A \\in A$.", r:4},
        {t:"$A$ is nonempty and bounded above, so $s = \\sup A$ exists by the LUB property.", r:0},
        {t:"Thus every neighborhood of $s$ contains a point of $A$ distinct from $s$, so $s$ is a limit point of $A$.", r:3},
        {t:"If $s\\in A$ we are done. If $s\\notin A$: for any $\\varepsilon>0$, $s-\\varepsilon$ is not an upper bound, so $\\exists x\\in A$ with $s-\\varepsilon < x \\leq s$.", r:1},
        {t:"Since $s\\notin A$ and $x\\in A$, we have $x\\neq s$, so $x\\in A\\cap N_\\varepsilon(s)$ with $x\\neq s$.", r:2},
        {t:"Hence $s\\in\\bar{A}$ (Thm 2.28).", r:3.5},
      ]},

    { pnum:2, title:"Closure $\\bar{A}$ is Closed", src:"PS3 Exercise 5b",
      stmt:"Let $(X,d)$ be a metric space and $A\\subseteq X$. Prove that $\\bar{A}$ is closed.",
      steps:[
        {t:"No point of $N$ is a limit point of $A$ (since $N\\cap A = \\emptyset$), so every point of $N$ lies in $\\bar{A}^c$.", r:3},
        {t:"We show $\\bar{A}^c$ is open. Let $p\\in\\bar{A}^c$.", r:0},
        {t:"Since $\\bar{A}^c$ is open, $\\bar{A}$ is closed (Thm 2.23).", r:4},
        {t:"Then $p\\notin A$ and $p$ is not a limit point of $A$. So $\\exists$ neighborhood $N$ of $p$ with $N\\cap A = \\emptyset$.", r:1},
        {t:"Therefore $p$ is an interior point of $\\bar{A}^c$. Since $p$ was arbitrary, $\\bar{A}^c$ is open.", r:3.5},
        {t:"This means $p$ is not a limit point of $\\bar{A}$, so $N \\subseteq \\bar{A}^c$.", r:2},
      ]},

    { pnum:3, title:"$A=\\{0\\}\\cup\\{1/n\\}$ is Compact", src:"PS3 Exercise 7",
      stmt:"Show that the set $A = \\{0\\} \\cup \\{1/n : n\\in\\mathbb{N},\\, n>0\\} \\subseteq \\mathbb{R}$ is compact.",
      steps:[
        {t:"We show $A$ is closed. The only candidate limit points are: since $1/n\\to 0$, the point $0$ is a limit point.", r:1},
        {t:"By Heine-Borel (Thm 2.41): $A$ is closed and bounded in $\\mathbb{R}$, hence compact.", r:4},
        {t:"All elements of $A$ satisfy $0\\leq a\\leq 1$, so $A$ is bounded.", r:0},
        {t:"For $p\\neq 0$: only finitely many $1/n$ lie within $|p|/2$ of $p$, so the minimum distance from $p$ to the rest of $A$ is some $r > 0$. Then $N_r(p)$ contains no other point of $A$.", r:2},
        {t:"Since $0\\in A$, all limit points of $A$ are in $A$. Therefore $A$ is closed.", r:3},
      ]},

    { pnum:4, title:"$\\operatorname{diam}(A) = \\operatorname{diam}(\\bar{A})$", src:"PS3 Exercise 8",
      stmt:"Let $(X,d)$ be a metric space and $A\\subset X$ bounded. Prove that $\\operatorname{diam}(A) = \\operatorname{diam}(\\bar{A})$.",
      steps:[
        {t:"Therefore $\\operatorname{diam}(\\bar{A}) \\leq \\operatorname{diam}(A)$. Combined with step 1: equality holds.", r:4},
        {t:"Since $A\\subseteq\\bar{A}$, clearly $\\operatorname{diam}(A) \\leq \\operatorname{diam}(\\bar{A})$.", r:0},
        {t:"For any $p,q\\in\\bar{A}$ and $\\varepsilon>0$: since $p,q\\in\\bar{A}$, $\\exists p'\\in A$ with $d(p,p')<\\varepsilon$ and $\\exists q'\\in A$ with $d(q,q')<\\varepsilon$.", r:1},
        {t:"By the triangle inequality: $d(p,q) \\leq d(p,p') + d(p',q') + d(q',q) < \\operatorname{diam}(A) + 2\\varepsilon$.", r:2},
        {t:"Since $\\varepsilon>0$ was arbitrary, $d(p,q)\\leq\\operatorname{diam}(A)$ for all $p,q\\in\\bar{A}$.", r:3},
      ]},
  ]},

  { label:"PS 4", topic:"Topology II: Compactness & Connectedness", probs:[

    { pnum:1, title:"Relative Topology Characterization", src:"PS4 Exercise 4",
      stmt:"Let $A\\subseteq Y\\subseteq X$. Prove that $A$ is open relative to $Y$ if and only if $A = Y\\cap B$ for some open $B\\subseteq X$.",
      steps:[
        {t:"$(\\Leftarrow)$: Suppose $A = Y\\cap G$ for open $G\\subseteq X$. For any $p\\in A$: $p\\in G$, so $\\exists r>0$: $N_r(p)\\subseteq G$ in $X$.", r:3},
        {t:"$(\\Rightarrow)$: Suppose $A$ is open relative to $Y$. For each $p\\in A$, $\\exists r_p>0$: $\\{q\\in Y: d(p,q)<r_p\\}\\subseteq A$.", r:0},
        {t:"Then $\\{q\\in Y: d(p,q)<r\\} = N_r(p)\\cap Y \\subseteq G\\cap Y = A$. So $p$ is interior to $A$ in $Y$.", r:4},
        {t:"Let $G = \\bigcup_{p\\in A} N_{r_p}(p)$. This is a union of open sets, hence open in $X$ (Thm 2.24a).", r:1},
        {t:"Since each $p\\in A$ lies in $N_{r_p}(p)\\cap Y \\subseteq A$, we get $A = G\\cap Y$.", r:2},
        {t:"Since $p\\in A$ was arbitrary, $A$ is open relative to $Y$.", r:5},
      ]},

    { pnum:2, title:"Connected Subsets of $\\mathbb{R}$ Have the Betweenness Property", src:"PS4 Exercise 7",
      stmt:"Prove: if $E\\subseteq\\mathbb{R}$ is connected, then $x,y\\in E$ and $x<z<y$ implies $z\\in E$.",
      steps:[
        {t:"Since $A\\cup B = E$ with $A,B$ nonempty and separated, $E$ is not connected — contradiction.", r:4},
        {t:"Both $A$ and $B$ are nonempty: $x\\in A$, $y\\in B$.", r:1},
        {t:"Suppose $E$ is connected. For contradiction, suppose $x,y\\in E$, $x<z<y$, but $z\\notin E$.", r:0},
        {t:"Let $A = E\\cap(-\\infty,z)$ and $B = E\\cap(z,\\infty)$.", r:0.5},
        {t:"$A$ and $B$ are separated: $\\bar{A}\\cap B \\subseteq (-\\infty,z]\\cap(z,\\infty) = \\emptyset$, and similarly $A\\cap\\bar{B}=\\emptyset$.", r:2},
        {t:"We have $A\\cup B = E$ since $z\\notin E$.", r:3},
      ]},

    { pnum:3, title:"Compact $\\Rightarrow$ Limit-Point Compact", src:"PS4 Exercise 8",
      stmt:"Let $(X,d)$ be a metric space and $A\\subseteq X$ compact. Prove that $A$ is limit-point compact: every infinite subset of $A$ has a limit point in $A$.",
      steps:[
        {t:"Each $V_q$ contains at most one point of $E$ (namely $q$, if $q\\in E$). So $E$ has at most $n$ points — contradicting $E$ being infinite.", r:4},
        {t:"Suppose $E$ has no limit point in $A$. Then every $q\\in A$ has a neighborhood $V_q$ containing no point of $E$ other than possibly $q$ itself.", r:1},
        {t:"Therefore $E$ has a limit point in $A$, so $A$ is limit-point compact.", r:5},
        {t:"Let $E$ be an infinite subset of $A$.", r:0},
        {t:"Since $A$ is compact, the open cover $\\{V_q : q\\in A\\}$ has a finite subcover: $A\\subseteq V_{q_1}\\cup\\cdots\\cup V_{q_n}$.", r:3},
        {t:"$\\{V_q : q\\in A\\}$ is an open cover of $A$.", r:2},
      ]},

    { pnum:4, title:"$\\mathbb{R}^n$ is Separable", src:"PS4 Exercise 3",
      stmt:"Prove that $\\mathbb{R}^n$ is separable, i.e., it has a countable dense subset.",
      steps:[
        {t:"By the density of $\\mathbb{Q}$ in $\\mathbb{R}$ (Thm 1.20b), for each $i$, $\\exists q_i\\in\\mathbb{Q}$ with $|x_i - q_i| < \\varepsilon/\\sqrt{n}$.", r:2},
        {t:"Since $\\mathbb{Q}$ is countable and the finite Cartesian product of countable sets is countable (Thm 2.13), $\\mathbb{Q}^n$ is countable.", r:0},
        {t:"Since $\\mathbb{Q}^n$ is a countable dense subset of $\\mathbb{R}^n$, we conclude $\\mathbb{R}^n$ is separable.", r:4},
        {t:"Let $\\mathbf{q}=(q_1,\\ldots,q_n)$. Then $|\\mathbf{x}-\\mathbf{q}| = \\sqrt{\\sum|x_i-q_i|^2} < \\sqrt{n\\cdot\\varepsilon^2/n} = \\varepsilon$.", r:3},
        {t:"To show $\\mathbb{Q}^n$ is dense: let $\\mathbf{x}=(x_1,\\ldots,x_n)\\in\\mathbb{R}^n$ and $\\varepsilon>0$.", r:1},
      ]},
  ]},

  { label:"PS 5", topic:"Sequences and Series", probs:[

    { pnum:1, title:"Limits are Unique", src:"PS5 Exercise 7",
      stmt:"Let $(X,d)$ be a metric space. Show that if $x_n\\to x$ and $x_n\\to y$, then $x=y$.",
      steps:[
        {t:"For $n\\geq\\max(N_1,N_2)$: by the triangle inequality, $d(x,y)\\leq d(x,x_n)+d(x_n,y) < \\varepsilon/2 + \\varepsilon/2 = \\varepsilon$.", r:3},
        {t:"Since $x_n\\to y$, $\\exists N_2$: $n\\geq N_2\\Rightarrow d(x_n,y)<\\varepsilon/2$.", r:2},
        {t:"Since $\\varepsilon>0$ was arbitrary and $d(x,y)\\geq 0$: $d(x,y)=0$, hence $x=y$.", r:4},
        {t:"Let $\\varepsilon>0$.", r:0},
        {t:"Since $x_n\\to x$, $\\exists N_1$: $n\\geq N_1\\Rightarrow d(x_n,x)<\\varepsilon/2$.", r:1},
      ]},

    { pnum:2, title:"Cauchy Sequences are Bounded", src:"PS5 Exercise 8.1",
      stmt:"Let $(X,d)$ be a metric space. Show that every Cauchy sequence $\\{x_n\\}$ in $X$ is bounded.",
      steps:[
        {t:"Let $M = \\max\\{d(x_1,x_N),\\, d(x_2,x_N),\\,\\ldots,\\, d(x_{N-1},x_N),\\, 1\\}$ (finite maximum).", r:2},
        {t:"Apply the Cauchy definition with $\\varepsilon=1$: $\\exists N$ s.t. $m,n\\geq N\\Rightarrow d(x_m,x_n)<1$.", r:0},
        {t:"For $n\\geq N$: $d(x_n,x_N)<1\\leq M$. For $n<N$: $d(x_n,x_N)\\leq M$ by definition.", r:3},
        {t:"In particular, $n\\geq N\\Rightarrow d(x_n,x_N)<1$.", r:1},
        {t:"Therefore all terms lie in $\\overline{B_M(x_N)}$, so $\\{x_n\\}$ is bounded.", r:4},
      ]},

    { pnum:3, title:"$s_1=\\sqrt{2},\\; s_{n+1}=\\sqrt{2+s_n}$ Converges to 2", src:"PS5 Exercise 3",
      stmt:"Define $s_1=\\sqrt{2}$ and $s_{n+1}=\\sqrt{2+s_n}$. Prove $s_n\\to 2$.",
      steps:[
        {t:"By the Monotone Convergence Theorem, $L=\\lim_{n\\to\\infty}s_n$ exists.", r:2},

// ─── STATE ────────────────────────────────────────────────────────────────────
let correct = 0, attempted = 0;
const total = PS.reduce((s,p)=>s+p.probs.length,0);
const state = {}; // state[pid] = { selected: [], checked: false, revealed: false }

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render(){
  const nav = document.getElementById('navs');
  const pages = document.getElementById('pages');

  PS.forEach((sheet, si)=>{
    // Nav tab
    const btn = document.createElement('button');
    btn.className = 'nt' + (si===0?' active':'');
    btn.id = 'nt'+si;
    btn.textContent = sheet.label;
    btn.onclick = ()=>showPage(si);
    nav.appendChild(btn);

    // Page
    const pg = document.createElement('div');
    pg.className = 'page' + (si===0?' active':'');
    pg.id = 'pg'+si;

    const hdr = document.createElement('div');
    hdr.className = 'ps-header';
    hdr.innerHTML = `<div class="ps-badge">${sheet.label}</div><h1>${sheet.topic}</h1><p class="ps-desc">Arrange the proof steps in logical order — click steps in the sequence they should appear.</p>`;
    pg.appendChild(hdr);

    const prog = document.createElement('div');
    prog.className = 'page-progress';
    prog.id = 'pgprog'+si;
    prog.textContent = '0 / '+sheet.probs.length+' completed';
    pg.appendChild(prog);

    sheet.probs.forEach((prob, pi)=>{
      const pid = `p${si}_${pi}`;
      state[pid] = {selected:[], checked:false, revealed:false};

      const card = document.createElement('div');
      card.className = 'prob';
      card.id = pid;

      // Sort steps by rank to build correctOrder, but display in given order
      const n = prob.steps.length;
      // Build the answer: for each displayed step (in order), what is its rank?
      // User must click in rank order 0,1,2,...
      // correctClickOrder[i] = the display index of the step with rank i (sorted)
      const sortedByRank = [...prob.steps.map((s,i)=>({...s,displayIdx:i}))].sort((a,b)=>a.r-b.r);

      card.innerHTML = `
        <div class="prob-header">
          <div class="prob-num">PROBLEM ${si+1}.${pi+1}</div>
          <div class="prob-title">${prob.title}</div>
          <div class="prob-src">${prob.src}</div>
        </div>
        <div class="prob-stmt"><strong>Statement:</strong> ${prob.stmt}</div>
        <div class="arrange-label">Click steps in the correct proof order</div>
        <div class="steps-grid" id="sg_${pid}">
          ${prob.steps.map((s,i)=>`
            <div class="step" id="step_${pid}_${i}" onclick="clickStep('${pid}',${i})">
              <div class="step-badge" id="badge_${pid}_${i}">—</div>
              <div class="step-text">${s.t}</div>
            </div>
          `).join('')}
        </div>
        <div class="btn-row">
          <button class="btn btn-check" id="btncheck_${pid}" onclick="checkProb('${pid}')" disabled>Check Order</button>
          <button class="btn btn-reset" onclick="resetProb('${pid}')">Reset</button>
          <button class="btn btn-reveal" onclick="revealProb('${pid}')">Show Answer</button>
        </div>
        <div class="feedback" id="fb_${pid}"></div>
        <div class="reveal-note" id="rev_${pid}">
          <strong>Correct order:</strong> ${sortedByRank.map((s,i)=>`<strong>${i+1}.</strong> ${s.t}`).join(' &nbsp;→&nbsp; ')}
        </div>
      `;

      pg.appendChild(card);
    });

    pages.appendChild(pg);
  });

  // Render math
  renderMathInElement(document.body,{
    delimiters:[{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false}],
    throwOnError:false
  });
}

function showPage(si){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nt').forEach(t=>t.classList.remove('active'));
  document.getElementById('pg'+si).classList.add('active');
  document.getElementById('nt'+si).classList.add('active');
  window.scrollTo(0,0);
}

function clickStep(pid, idx){
  const s = state[pid];
  if(s.checked || s.revealed) return;

  const sel = s.selected;
  const alreadyAt = sel.indexOf(idx);

  if(alreadyAt !== -1){
    // Deselect: remove from selected
    sel.splice(alreadyAt, 1);
    refreshBadges(pid);
    document.getElementById('btncheck_'+pid).disabled = (sel.length === 0);
    return;
  }

  // Get number of steps
  const sheet = PS[parseInt(pid.split('_')[0].replace('p',''))];
  const probIdx = parseInt(pid.split('_')[1]);
  const n = sheet.probs[probIdx].steps.length;

  if(sel.length < n){
    sel.push(idx);
    refreshBadges(pid);
    const allSelected = sel.length === n;
    document.getElementById('btncheck_'+pid).disabled = !allSelected;
  }
}

function refreshBadges(pid){
  const s = state[pid];
  const sheet = PS[parseInt(pid.split('_')[0].replace('p',''))];
  const probIdx = parseInt(pid.split('_')[1]);
  const n = sheet.probs[probIdx].steps.length;

  for(let i=0;i<n;i++){
    const badge = document.getElementById(`badge_${pid}_${i}`);
    const step = document.getElementById(`step_${pid}_${i}`);
    const pos = s.selected.indexOf(i);
    if(pos !== -1){
      badge.textContent = pos+1;
      step.classList.add('selected');
      step.classList.remove('correct','wrong');
    } else {
      badge.textContent = '—';
      step.classList.remove('selected','correct','wrong');
    }
  }
}

function checkProb(pid){
  const s = state[pid];
  if(s.checked) return;
  s.checked = true;

  const si = parseInt(pid.split('_')[0].replace('p',''));
  const pi = parseInt(pid.split('_')[1]);
  const prob = PS[si].probs[pi];
  const n = prob.steps.length;

  // Build correct order: for each click position 0..n-1, what display index should be there?
  // The correct sequence is: display indices sorted by their rank
  const sortedByRank = [...prob.steps.map((step,i)=>({r:step.r,i}))].sort((a,b)=>a.r-b.r);
  const correctOrder = sortedByRank.map(x=>x.i);

  const userOrder = s.selected; // display indices in user's click order

  let allRight = true;
  for(let pos=0;pos<n;pos++){
    const displayIdx = userOrder[pos];
    const step = document.getElementById(`step_${pid}_${displayIdx}`);
    const badge = document.getElementById(`badge_${pid}_${displayIdx}`);
    badge.textContent = pos+1;
    if(correctOrder[pos] === displayIdx){
      step.classList.add('correct');
      step.classList.remove('selected','wrong');
    } else {
      step.classList.add('wrong');
      step.classList.remove('selected','correct');
      allRight = false;
    }
  }

  const fb = document.getElementById(`fb_${pid}`);
  fb.className = 'feedback show ' + (allRight ? 'fb-ok' : 'fb-no');
  fb.textContent = allRight
    ? '✓ Correct! All steps in the right order.'
    : '✗ Not quite. Red steps are out of place. Click "Show Answer" to see the correct sequence.';

  document.getElementById(`btncheck_${pid}`).disabled = true;
  attempted++;
  if(allRight){ correct++; updateScore(); }
  else { updateScore(); }
  updatePageProgress(si);
}

function resetProb(pid){
  const s = state[pid];
  s.selected = []; s.checked = false; s.revealed = false;

  const si = parseInt(pid.split('_')[0].replace('p',''));
  const pi = parseInt(pid.split('_')[1]);
  const n = PS[si].probs[pi].steps.length;

  for(let i=0;i<n;i++){
    document.getElementById(`step_${pid}_${i}`).className = 'step';
    document.getElementById(`badge_${pid}_${i}`).textContent = '—';
  }
  document.getElementById(`fb_${pid}`).className = 'feedback';
  document.getElementById(`rev_${pid}`).className = 'reveal-note';
  document.getElementById(`btncheck_${pid}`).disabled = true;
}

function revealProb(pid){
  const s = state[pid];
  s.revealed = true;

  const si = parseInt(pid.split('_')[0].replace('p',''));
  const pi = parseInt(pid.split('_')[1]);
  const prob = PS[si].probs[pi];
  const n = prob.steps.length;

  const sortedByRank = [...prob.steps.map((step,i)=>({r:step.r,i}))].sort((a,b)=>a.r-b.r);
  const correctOrder = sortedByRank.map(x=>x.i);

  for(let pos=0;pos<n;pos++){
    const di = correctOrder[pos];
    const step = document.getElementById(`step_${pid}_${di}`);
    const badge = document.getElementById(`badge_${pid}_${di}`);
    badge.textContent = pos+1;
    step.className = 'step revealed-ok';
  }

  document.getElementById(`rev_${pid}`).className = 'reveal-note show';
  document.getElementById(`btncheck_${pid}`).disabled = true;
  updatePageProgress(si);
}

function updateScore(){
  document.getElementById('score-val').textContent = `${correct} / ${total}`;
  const pct = total>0 ? Math.round(correct/total*100) : 0;
  document.getElementById('score-pct').textContent = `(${pct}%)`;
  const prog = Math.round(attempted/total*100);
  document.getElementById('pfill').style.width = prog+'%';
}

function updatePageProgress(si){
  const sheet = PS[si];
  let done = 0;
  sheet.probs.forEach((_,pi)=>{
    const pid = `p${si}_${pi}`;
    if(state[pid].checked || state[pid].revealed) done++;
  });
  document.getElementById(`pgprog${si}`).textContent = `${done} / ${sheet.probs.length} completed`;
}

function init(){
  render();
  updateScore();
  window.addEventListener('scroll',()=>{
    const h = document.documentElement.scrollHeight-window.innerHeight;
    document.getElementById('pfill').style.width = (h>0?window.scrollY/h*100:0)+'%';
  });
}
</script>
</body>
</html>
